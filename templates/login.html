{% include "navbar.html" %}

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f0f2f5;
  }

  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
  }

  .page-content {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding-top: 80px;
  }

  .form-container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    width: 350px;
    text-align: center;
    margin-bottom: 100px;
  }

  .form-container h2 {
    margin-bottom: 20px;
    color: #2c3e50;
  }

  .input-wrapper {
    position: relative;
    width: 100%;
  }

  .input-wrapper input {
    width: 100%;
    padding: 12px 40px 12px 35px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
  }

  .input-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: #888;
  }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 13px;
    color: #25a517;
    user-select: none;
  }

  .form-container button {
    width: 100%;
    padding: 12px;
    background: #25a517;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s ease;
  }

  .form-container button:hover {
    background: #1d8612;
  }

  .form-container p {
    margin-top: 15px;
    font-size: 14px;
  }

  .form-container a {
    color: #25a517;
    text-decoration: none;
    font-weight: bold;
  }

  .form-container a:hover {
    text-decoration: underline;
  }
</style>

<div class="page-content">
  <div class="form-container">
    <h2>Login</h2>
    <form method="POST">

      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" name="password" id="login-password" placeholder="Password" required>
        <span class="toggle-password" onclick="togglePassword('login-password', this)">Show</span>
      </div>

      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{{ url_for('signup') }}">Signup</a></p>
  </div>
</div>

<script>
function togglePassword(fieldId, toggleElement) {
  const field = document.getElementById(fieldId);
  if (field.type === "password") {
    field.type = "text";
    toggleElement.textContent = "Hide";
  } else {
    field.type = "password";
    toggleElement.textContent = "Show";
  }
}
</script>
